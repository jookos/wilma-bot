services:
  wilma-bot:
    image: jookos.org/wilma-bot:latest
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8080}:8080"
    environment:
      WILMA_BASE_URL: ${WILMA_BASE_URL}
      WILMA_USERNAME: ${WILMA_USERNAME}
      WILMA_PASSWORD: ${WILMA_PASSWORD}
      WILMA_SESSION_TIMEOUT: ${WILMA_SESSION_TIMEOUT:-30}
    command: ["--http", "8080"]
