stages:
  - build

variables:
  IMAGE: jookos.org/wilma-bot
  TAG: $CI_COMMIT_SHORT_SHA

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      changes:
        - src/**/*
    - when: manual
  script:
    - docker build -t $IMAGE:$TAG -t $IMAGE:latest .
